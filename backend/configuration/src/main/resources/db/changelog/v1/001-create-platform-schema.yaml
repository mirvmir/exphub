databaseChangeLog:
  - changeSet:
      id: 001-create-platform-schema
      author: chatgpt
      changes:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              CREATE TABLE IF NOT EXISTS users (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  email VARCHAR(255) NOT NULL UNIQUE,
                  password_hash VARCHAR(255) NOT NULL,
                  role VARCHAR(255) NOT NULL,
                  profileCompleted BOOLEAN NOT NULL
              );

              CREATE TABLE IF NOT EXISTS refresh_token (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  token_hash VARCHAR(255) NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  expires_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS pending_email_change (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  new_email VARCHAR(255) NOT NULL,
                  token VARCHAR(255) NOT NULL,
                  expires_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS profile (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  given_name VARCHAR(255),
                  family_name VARCHAR(255),
                  father_name VARCHAR(255),
                  avatar_media_file_asset_id BIGINT,
                  email_visibility BOOLEAN NOT NULL
              );

              CREATE TABLE IF NOT EXISTS media_file_asset (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  original_name VARCHAR(255) NOT NULL,
                  mime_type VARCHAR(255) NOT NULL,
                  size_bytes BIGINT NOT NULL,
                  storage_path VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS video_asset (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  poster_file_id BIGINT,
                  duration_seconds INTEGER NOT NULL,
                  storage_path VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS subject (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  name VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS section (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  subject_id BIGINT NOT NULL,
                  name VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS topic (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  subject_id BIGINT NOT NULL,
                  section_id BIGINT NOT NULL,
                  name VARCHAR(255) NOT NULL,
                  description VARCHAR(255)
              );

              CREATE TABLE IF NOT EXISTS topic_suggestion (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  created_by_user_id BIGINT NOT NULL,
                  subject_id BIGINT NOT NULL,
                  section_id BIGINT NOT NULL,
                  name VARCHAR(255) NOT NULL,
                  description VARCHAR(255),
                  status VARCHAR(255),
                  moderation_comment VARCHAR(255),
                  resolved_topic_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS activity (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  author_id BIGINT NOT NULL,
                  title VARCHAR(255) NOT NULL,
                  short_description VARCHAR(255),
                  description_html VARCHAR(255),
                  max_bookable_seats INTEGER NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  duration_minutes INTEGER NOT NULL,
                  moderation_comment VARCHAR(255),
                  booking_step_minutes INTEGER,
                  moderation_status VARCHAR(255) NOT NULL,
                  content_status VARCHAR(255) NOT NULL,
                  type VARCHAR(255) NOT NULL,
                  subject_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS activity_time (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  activity_id BIGINT,
                  start_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  end_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS activity_topic (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  activity_id BIGINT NOT NULL,
                  topic_id BIGINT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS activity_slot (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  activity_id BIGINT NOT NULL,
                  teacher_id BIGINT NOT NULL,
                  created_by_user_id BIGINT NOT NULL,
                  start_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  end_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  room_join_url VARCHAR(255)
              );

              CREATE TABLE IF NOT EXISTS course_version (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  title VARCHAR(255) NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  moderation_status VARCHAR(255) NOT NULL,
                  moderation_comment VARCHAR(255),
                  short_description VARCHAR(255) NOT NULL,
                  description_html VARCHAR(255)
              );

              CREATE TABLE IF NOT EXISTS course (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  author_id BIGINT NOT NULL,
                  content_status VARCHAR(255) NOT NULL,
                  published_version BIGINT UNIQUE,
                  draft_version BIGINT NOT NULL UNIQUE
              );

              CREATE TABLE IF NOT EXISTS course_topic (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_id BIGINT NOT NULL,
                  topic_id BIGINT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS course_lesson_opening (
                  course_id BIGINT NOT NULL,
                  stable_lesson_id UUID NOT NULL,
                  opens_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  PRIMARY KEY (course_id, stable_lesson_id)
              );

              CREATE TABLE IF NOT EXISTS course_module (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_version_id BIGINT NOT NULL,
                  stable_module_id UUID NOT NULL,
                  title VARCHAR(255) NOT NULL,
                  sort_order INTEGER NOT NULL
              );

              CREATE TABLE IF NOT EXISTS course_lesson (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_module_id BIGINT NOT NULL,
                  stable_lesson_id UUID NOT NULL,
                  sort_order INTEGER NOT NULL,
                  title VARCHAR(255) NOT NULL,
                  type VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS lesson_block (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_lesson_id BIGINT NOT NULL,
                  stable_block_id UUID NOT NULL,
                  sort_order INTEGER NOT NULL,
                  content_type VARCHAR(255) NOT NULL,
                  content_hash VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS lesson_html (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  lesson_block_id BIGINT NOT NULL UNIQUE,
                  content TEXT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS lesson_pdf (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  lesson_block_id BIGINT NOT NULL UNIQUE,
                  file_asset_id BIGINT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS lesson_video (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  lesson_block_id BIGINT NOT NULL UNIQUE,
                  video_asset_id BIGINT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS course_catalog (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_id BIGINT NOT NULL,
                  title VARCHAR(255) NOT NULL,
                  author_name VARCHAR(255) NOT NULL,
                  shortDescription VARCHAR(255) NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  rating_avg DOUBLE PRECISION NOT NULL,
                  review_count BIGINT NOT NULL
              );

              CREATE TABLE IF NOT EXISTS course_catalog_topic (
                  course_catalog_id BIGINT NOT NULL,
                  topic_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS course_catalog_section (
                  course_catalog_id BIGINT NOT NULL,
                  section_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS course_catalog_subject (
                  course_catalog_id BIGINT NOT NULL,
                  subject_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS activity_catalog (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  activity_id BIGINT NOT NULL,
                  title VARCHAR(255),
                  author_name VARCHAR(255),
                  shortDescription VARCHAR(255) NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  rating_avg DOUBLE PRECISION NOT NULL,
                  review_count BIGINT NOT NULL,
                  format VARCHAR(255)
              );

              CREATE TABLE IF NOT EXISTS activity_catalog_topic (
                  activity_catalog_id BIGINT NOT NULL,
                  topic_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS activity_catalog_section (
                  activity_catalog_id BIGINT NOT NULL,
                  section_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS activity_catalog_subject (
                  activity_catalog_id BIGINT NOT NULL,
                  subject_id BIGINT
              );

              CREATE TABLE IF NOT EXISTS course_enrollment (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  course_id BIGINT NOT NULL,
                  published_version_id BIGINT NOT NULL,
                  user_id BIGINT NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  progress_percent NUMERIC(38, 2),
                  subscribed_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS activity_enrollment (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  activity_slot_id BIGINT NOT NULL,
                  user_id BIGINT NOT NULL,
                  status VARCHAR(255),
                  subscribed_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS orders (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  enrollment_id BIGINT NOT NULL,
                  target_type VARCHAR(255) NOT NULL,
                  target_id BIGINT NOT NULL,
                  target_version_id BIGINT,
                  amount NUMERIC(19, 2) NOT NULL,
                  currency VARCHAR(3) NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  expires_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS student_lesson_progress (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  enrollment_id BIGINT NOT NULL,
                  course_lesson_id BIGINT NOT NULL,
                  completed_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  CONSTRAINT uq_student_lesson_progress_enrollment_lesson UNIQUE (enrollment_id, course_lesson_id)
              );

              CREATE TABLE IF NOT EXISTS user_card (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  bank_card_id VARCHAR(255) NOT NULL UNIQUE,
                  card_token VARCHAR(255) NOT NULL UNIQUE,
                  masked_pan VARCHAR(255) NOT NULL,
                  last4 VARCHAR(4) NOT NULL,
                  payment_system VARCHAR(255) NOT NULL,
                  active BOOLEAN NOT NULL,
                  is_default BOOLEAN NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  updated_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS payment (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  external_payment_id VARCHAR(255) NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  description VARCHAR(255),
                  order_id BIGINT NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  paid_at TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE IF NOT EXISTS refund (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  payment_id BIGINT NOT NULL,
                  external_refund_id VARCHAR(255) UNIQUE,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  reason VARCHAR(255),
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  refunded_at TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE IF NOT EXISTS payout (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  card_id BIGINT NOT NULL,
                  external_payout_id VARCHAR(255) UNIQUE,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  description VARCHAR(255),
                  wallet_withdrawal_id BIGINT NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  paid_at TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE IF NOT EXISTS practice_submission (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  lesson_id BIGINT NOT NULL,
                  course_enrollment_id BIGINT NOT NULL,
                  student_id BIGINT NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  checked_at TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE IF NOT EXISTS practice_submission_answer (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  practice_submission_id BIGINT NOT NULL,
                  html TEXT NOT NULL,
                  file_id BIGINT,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS practice_submission_comment (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  practice_submission_answer_id BIGINT NOT NULL,
                  html TEXT NOT NULL,
                  file_id BIGINT,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS review (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  comment VARCHAR(255),
                  score DOUBLE PRECISION NOT NULL,
                  to_item_id BIGINT NOT NULL,
                  from_user_id BIGINT NOT NULL,
                  target_type VARCHAR(255) NOT NULL,
                  status VARCHAR(255) NOT NULL
              );

              CREATE TABLE IF NOT EXISTS wallet (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  teacher_id BIGINT NOT NULL UNIQUE,
                  balance NUMERIC(38, 2) NOT NULL,
                  currency VARCHAR(3) NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  updated_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE TABLE IF NOT EXISTS wallet_withdrawal (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  user_id BIGINT NOT NULL,
                  wallet_id BIGINT NOT NULL,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  status VARCHAR(255) NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL,
                  completed_at TIMESTAMP WITH TIME ZONE
              );

              CREATE TABLE IF NOT EXISTS wallet_transaction (
                  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                  wallet_id BIGINT NOT NULL,
                  payment_id BIGINT,
                  wallet_withdrawal_id BIGINT,
                  price_amount NUMERIC(38, 2) NOT NULL,
                  price_currency VARCHAR(3) NOT NULL,
                  type VARCHAR(255) NOT NULL,
                  created_at TIMESTAMP WITH TIME ZONE NOT NULL
              );

              CREATE INDEX IF NOT EXISTS idx_refresh_token_user_id ON refresh_token(user_id);
              CREATE INDEX IF NOT EXISTS idx_profile_user_id ON profile(user_id);
              CREATE INDEX IF NOT EXISTS idx_activity_slot_activity_id ON activity_slot(activity_id);
              CREATE INDEX IF NOT EXISTS idx_course_enrollment_user_course ON course_enrollment(user_id, course_id);
              CREATE INDEX IF NOT EXISTS idx_activity_enrollment_user_slot ON activity_enrollment(user_id, activity_slot_id);
              CREATE INDEX IF NOT EXISTS idx_orders_user_id ON orders(user_id);
              CREATE INDEX IF NOT EXISTS idx_orders_status_expires_at ON orders(status, expires_at);
              CREATE INDEX IF NOT EXISTS idx_payment_order_id ON payment(order_id);
              CREATE INDEX IF NOT EXISTS idx_refund_payment_id ON refund(payment_id);
              CREATE INDEX IF NOT EXISTS idx_practice_submission_enrollment ON practice_submission(course_enrollment_id);
              CREATE INDEX IF NOT EXISTS idx_wallet_transaction_wallet_id ON wallet_transaction(wallet_id);
      rollback:
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              DROP TABLE IF EXISTS wallet_transaction;
              DROP TABLE IF EXISTS wallet_withdrawal;
              DROP TABLE IF EXISTS wallet;
              DROP TABLE IF EXISTS review;
              DROP TABLE IF EXISTS practice_submission_comment;
              DROP TABLE IF EXISTS practice_submission_answer;
              DROP TABLE IF EXISTS practice_submission;
              DROP TABLE IF EXISTS payout;
              DROP TABLE IF EXISTS refund;
              DROP TABLE IF EXISTS payment;
              DROP TABLE IF EXISTS user_card;
              DROP TABLE IF EXISTS student_lesson_progress;
              DROP TABLE IF EXISTS orders;
              DROP TABLE IF EXISTS activity_enrollment;
              DROP TABLE IF EXISTS course_enrollment;
              DROP TABLE IF EXISTS activity_catalog_subject;
              DROP TABLE IF EXISTS activity_catalog_section;
              DROP TABLE IF EXISTS activity_catalog_topic;
              DROP TABLE IF EXISTS activity_catalog;
              DROP TABLE IF EXISTS course_catalog_subject;
              DROP TABLE IF EXISTS course_catalog_section;
              DROP TABLE IF EXISTS course_catalog_topic;
              DROP TABLE IF EXISTS course_catalog;
              DROP TABLE IF EXISTS lesson_video;
              DROP TABLE IF EXISTS lesson_pdf;
              DROP TABLE IF EXISTS lesson_html;
              DROP TABLE IF EXISTS lesson_block;
              DROP TABLE IF EXISTS course_lesson;
              DROP TABLE IF EXISTS course_module;
              DROP TABLE IF EXISTS course_lesson_opening;
              DROP TABLE IF EXISTS course_topic;
              DROP TABLE IF EXISTS course;
              DROP TABLE IF EXISTS course_version;
              DROP TABLE IF EXISTS activity_slot;
              DROP TABLE IF EXISTS activity_topic;
              DROP TABLE IF EXISTS activity_time;
              DROP TABLE IF EXISTS activity;
              DROP TABLE IF EXISTS topic_suggestion;
              DROP TABLE IF EXISTS topic;
              DROP TABLE IF EXISTS section;
              DROP TABLE IF EXISTS subject;
              DROP TABLE IF EXISTS video_asset;
              DROP TABLE IF EXISTS media_file_asset;
              DROP TABLE IF EXISTS profile;
              DROP TABLE IF EXISTS pending_email_change;
              DROP TABLE IF EXISTS refresh_token;
              DROP TABLE IF EXISTS users;
